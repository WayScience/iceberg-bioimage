---
name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre_commit_checks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install pre-commit
        run: uv tool install pre-commit
      - name: Run pre-commit
        run: uv run --with pre-commit pre-commit run --all-files

  test_matrix:
    strategy:
      matrix:
        python_version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Run pytest
        run: uv run --frozen pytest

  docs_and_integrations:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Run Ruff
        run: uv run --frozen ruff check
      - name: Build docs
        run: uv run --group docs --frozen sphinx-build -b html docs/src docs/_build/html
      - name: Run optional DuckDB integration tests
        run: uv run --group duckdb --frozen pytest tests/test_duckdb.py
